{% extends 'posts/base.html' %}

{% block content %}
<h2>Delete Post</h2>

<p>Are you sure you want to delete this post?</p>

<h3>{{ post.title }}</h3>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'posts_list' %}">Cancel</a>
</form>
{% endblock %}
